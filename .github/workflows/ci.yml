name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.node }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 20
            node-version: "20.20.2"
            npm-version: "10.8.2"
          - node: 22
            node-version: "22.23.1"
            npm-version: "10.9.8"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Verify exact Node.js runtime
        shell: bash
        env:
          EXPECTED_NODE_VERSION: ${{ matrix.node-version }}
          EXPECTED_NPM_VERSION: ${{ matrix.npm-version }}
        run: |
          [[ "$(node --version)" == "v${EXPECTED_NODE_VERSION}" ]]
          [[ "$(npm --version)" == "${EXPECTED_NPM_VERSION}" ]]
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm audit --audit-level=moderate

  browser-e2e:
    name: Chromium E2E
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up exact Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.23.1"
          cache: npm
      - name: Verify exact toolchain
        shell: bash
        env:
          EXPECTED_NODE_VERSION: "22.23.1"
          EXPECTED_NPM_VERSION: "10.9.8"
        run: |
          [[ "$(node --version)" == "v${EXPECTED_NODE_VERSION}" ]]
          [[ "$(npm --version)" == "${EXPECTED_NPM_VERSION}" ]]
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Install pinned Chromium runtime
        run: npx --no-install playwright install --with-deps chromium
      - name: Exercise the real protocol explorer
        run: npm run test:e2e
      - name: Upload failure diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: dig-playwright-diagnostics
          path: test-results/playwright
          if-no-files-found: ignore
          retention-days: 7
