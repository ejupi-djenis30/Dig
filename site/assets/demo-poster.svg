<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DIG protocol explorer</title>
  <desc id="desc">A dark interface showing a Gopher menu beside an inspectable protocol trace.</desc>
  <rect width="1600" height="900" fill="#eef0e8"/>
  <rect x="80" y="80" width="1440" height="740" rx="30" fill="#101313"/>
  <rect x="80" y="80" width="1440" height="90" rx="30" fill="#1b2020"/>
  <circle cx="130" cy="125" r="12" fill="#d8ff3e"/>
  <text x="175" y="137" font-family="monospace" font-size="27" fill="#eef0e8">gopher://dig.local/1/</text>
  <rect x="112" y="205" width="820" height="96" rx="12" fill="#d8ff3e"/>
  <text x="148" y="263" font-family="Arial" font-size="30" font-weight="700" fill="#101313">DIR</text>
  <text x="250" y="263" font-family="Arial" font-size="34" font-weight="700" fill="#101313">Field notes</text>
  <g font-family="Arial" font-size="31" fill="#eef0e8">
    <text x="148" y="365">TXT</text><text x="250" y="365">Why Gopher still matters</text>
    <text x="148" y="455">DIR</text><text x="250" y="455">Protocol specimens</text>
    <text x="148" y="545">ASK</text><text x="250" y="545">Search the archive</text>
  </g>
  <line x1="980" y1="205" x2="980" y2="750" stroke="#394140" stroke-width="2"/>
  <text x="1040" y="245" font-family="monospace" font-size="20" letter-spacing="3" fill="#d8ff3e">PROTOCOL TRACE</text>
  <text x="1040" y="390" font-family="Arial" font-size="130" font-weight="800" fill="#eef0e8">DIR</text>
  <text x="1040" y="470" font-family="Arial" font-size="38" font-weight="700" fill="#eef0e8">Field notes</text>
  <text x="1040" y="550" font-family="monospace" font-size="21" fill="#9da6a1">selector  /notes</text>
  <text x="1040" y="600" font-family="monospace" font-size="21" fill="#9da6a1">host      dig.local</text>
  <text x="1040" y="650" font-family="monospace" font-size="21" fill="#9da6a1">port      70</text>
  <circle cx="1450" cy="760" r="18" fill="#ff6038"/>
</svg>
